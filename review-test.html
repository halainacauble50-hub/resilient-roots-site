

 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reader Reviews | Halaina Cauble</title>

<style>
body {
    margin: 0;
    font-family: Georgia, serif;
    background: #f6f3ee;
    color: #2d241c;
}

header {
    background: #241a14;
    color: white;
    text-align: center;
    padding: 30px;
}

header h1 {
    margin: 0;
    font-size: 2.5rem;
}

.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
}

.review-card {
    background: white;
    padding: 30px;
    margin-bottom: 30px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
}

.reviewer {
    font-size: 1.3rem;
    font-weight: bold;
    margin-bottom: 15px;
}

.review-text {
    line-height: 1.8;
    font-size: 1.05rem;
}

.stars {
    color: #b8860b;
    font-size: 1.2rem;
    margin-top: 15px;
}

.button {
    display: inline-block;
    background: #8a6f4d;
    color: white;
    text-decoration: none;
    padding: 12px 24px;
    border-radius: 6px;
    margin-top: 20px;
}

.button:hover {
    opacity: 0.9;
}
</style>

</head>
<body>

<header>
    <h1>Reader Reviews</h1>
</header>

<div class="container">

   <p style="text-align:center;font-size:1.1rem;">
  What readers are saying about <em>Resilient Roots</em>.
</p>

<div style="text-align:center; margin:20px 0;">
  <a href="https://docs.google.com/forms/d/e/1FAIpQLSdxvDAPXDKi-mY8bL3tIGaq9ePtgCxsVEDFOAAUD5lphHBVMQ/viewform"
     class="button"
     target="_blank">
     Share Your Review
  </a>

<div id="reviews-container"></div>
 
</div>
    <a href="index.html" class="button">
        Back to Main Website
    </a>

    <br><br>

   

</div>

</div>
<script>
fetch('https://docs.google.com/spreadsheets/d/e/2PACX-1vQHezbJfrgg3-vZ6nN8AYUWfg4oxWBegxl4M3_1VTuWMGa5ubLTTh8c8vpKRdOwAeA1hJsB_wPvpb07/pub?gid=127253048&single=true&output=csv')
  .then(response => response.text())
  .then(data => {
    const rows = data.split('\n').slice(1);
    const container = document.getElementById('reviews-container');

rows.forEach(row => {
    console.log(row);



const cols = row.split(',');

if (!row.includes(',YES')) return;

const name = cols[1] || '';
const review = cols.slice(3, -1).join(',');

      container.innerHTML += `
        <div class="review-card">
          <div class="reviewer" style="text-align:center;">
            ${name}
          </div>

          <div class="review-text">
            ${review}
          </div>

          <div class="stars" style="text-align:center;">
            ★★★★★ 5.0 Rating
          </div>
        </div>
      `;
    });
  });
</script>
</body>
</html>
